<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Nautilus 行情看板</title>
    <!-- 新手极简CSS，无复杂样式 -->
    <style>
        body { font-family: Arial; margin: 20px; }
        .title { text-align: center; }
        .status { margin: 20px 0; padding: 10px; background: #f5f5f5; }
        #chart { width: 100%; height: 500px; }
    </style>
    <!-- 引入行情图表库（交易专用，自带缩放平移） -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <h1 class="title">Nautilus Trader 行情可视化看板</h1>
    
    <!-- 系统状态监控（任务B要求） -->
    <div class="status">
        <h3>系统状态</h3>
        <p id="running">加载中...</p>
        <p id="venue">加载中...</p>
    </div>

    <!-- K线+成交量图表（任务B要求） -->
    <div id="chart"></div>

    <script>
        // 1. 获取系统状态
        fetch("/api/status")
            .then(res => res.json())
            .then(data => {
                document.getElementById("running").innerText = "运行状态：" + data.running;
                document.getElementById("venue").innerText = "交易所：" + data.venue;
            });

        // 2. 获取K线数据，绘制图表
        fetch("/api/kline")
            .then(res => res.json())
            .then(data => {
                // 创建图表容器
                const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                    width: 1100,
                    height: 500
                });

                // 绘制K线图
                const candlestickSeries = chart.addCandlestickSeries();
                candlestickSeries.setData(data);

                // 绘制成交量图
                const volumeSeries = chart.addHistogramSeries({
                    color: '#26a69a',
                    priceFormat: { type: 'volume' }
                });
                volumeSeries.setData(data.map(item => ({
                    time: item.time,
                    value: item.volume
                })));
            });
    </script>
</body>
</html>
